<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PesoTrack — Personal Finance Tracker</title>
<meta name="description" content="A minimalist personal finance tracker for the Philippines. Track income, expenses, budgets, and savings goals — fully offline, no account needed.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='18' fill='white'>₱</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap');

  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0f;
    --bg2:      #141416;
    --bg3:      #1a1a1e;
    --bg4:      #222228;
    --border:   #2a2a32;
    --border2:  #333340;
    --text:     #e8e8f0;
    --text2:    #9090a8;
    --text3:    #5a5a70;
    --green:      #22c55e;
    --green-dim:  #16a34a;
    --green-bg:   rgba(34,197,94,0.08);
    --yellow:     #eab308;
    --yellow-dim: #ca8a04;
    --yellow-bg:  rgba(234,179,8,0.08);
    --red:        #ef4444;
    --red-dim:    #dc2626;
    --red-bg:     rgba(239,68,68,0.08);
    --accent:     #6366f1;
    --accent-dim: #4f46e5;
    --accent-bg:  rgba(99,102,241,0.10);
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
    --r:  8px;
    --r2: 12px;
    --r3: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
  }

  #root { display: flex; flex-direction: column; height: 100%; min-height: 100vh; }

  /* ── Navigation ───────────────────────────────────────────── */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .nav-brand {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-right: 24px;
    white-space: nowrap;
    user-select: none;
  }
  .nav-brand span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 2px; overflow-x: auto; flex: 1; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 6px 12px;
    border-radius: var(--r);
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    white-space: nowrap;
    transition: all .15s;
    font-family: var(--font);
  }
  .nav-tab:hover  { color: var(--text); background: var(--bg4); }
  .nav-tab.active { color: var(--text); background: var(--bg4); }

  /* ── Main Content ─────────────────────────────────────────── */
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── Cards ────────────────────────────────────────────────── */
  .card    { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; }
  .card-sm { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);  padding: 12px; }

  /* ── Grids ────────────────────────────────────────────────── */
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 640px) {
    .grid4 { grid-template-columns: repeat(2, 1fr); }
    .grid3 { grid-template-columns: 1fr; }
    .grid2 { grid-template-columns: 1fr; }
  }

  /* ── Stat Cards ───────────────────────────────────────────── */
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
  .stat-sub   { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* ── Buttons ──────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--r);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover            { background: var(--bg4); }
  .btn-primary          { background: var(--accent);    border-color: var(--accent);    color: #fff; }
  .btn-primary:hover    { background: var(--accent-dim); border-color: var(--accent-dim); }
  .btn-danger           { background: var(--red-bg); border-color: var(--red-dim); color: var(--red); }
  .btn-danger:hover     { background: rgba(239,68,68,0.14); }
  .btn-sm               { padding: 4px 10px; font-size: 12px; }

  /* ── Forms ────────────────────────────────────────────────── */
  .form-group   { margin-bottom: 14px; }
  .form-label   { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-control {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border .15s;
  }
  .form-control:focus             { border-color: var(--accent); }
  .form-control::placeholder      { color: var(--text3); }
  select.form-control option      { background: var(--bg3); color: var(--text); }

  /* ── Toggle Switch ────────────────────────────────────────── */
  .toggle {
    appearance: none;
    width: 36px; height: 20px;
    background: var(--bg4);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background .15s;
    border: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .toggle:checked           { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    top: 2px; left: 2px;
    transition: left .15s;
  }
  .toggle:checked::after    { left: 18px; }

  /* ── Tags / Badges ────────────────────────────────────────── */
  .tag        { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-green  { background: var(--green-bg);  color: var(--green); }
  .tag-red    { background: var(--red-bg);    color: var(--red); }
  .tag-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .tag-accent { background: var(--accent-bg); color: var(--accent); }

  /* ── Progress Bar ─────────────────────────────────────────── */
  .progress-track { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .progress-fill  { height: 100%; border-radius: 3px; transition: width .4s ease; }

  /* ── Section Title ────────────────────────────────────────── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 12px;
  }

  /* ── Transaction Rows ─────────────────────────────────────── */
  .txn-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .txn-row:last-child { border-bottom: none; }
  .txn-icon   { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .txn-meta   { flex: 1; min-width: 0; }
  .txn-desc   { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-sub    { font-size: 11px; color: var(--text2); }
  .txn-amount { font-family: var(--mono); font-size: 14px; font-weight: 500; text-align: right; flex-shrink: 0; }

  /* ── Modal ────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.72);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r3);
    padding: 20px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  /* ── Banner ───────────────────────────────────────────────── */
  .banner {
    background: var(--yellow-bg);
    border: 1px solid var(--yellow-dim);
    border-radius: var(--r);
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  /* ── Utility Classes ──────────────────────────────────────── */
  .flex            { display: flex; }
  .flex-col        { flex-direction: column; }
  .items-center    { align-items: center; }
  .justify-between { justify-content: space-between; }
  .flex-1          { flex: 1; }
  .w100            { width: 100%; }
  .gap4            { gap: 4px; }
  .gap8            { gap: 8px; }
  .gap12           { gap: 12px; }
  .mb8             { margin-bottom: 8px; }
  .mb12            { margin-bottom: 12px; }
  .mb16            { margin-bottom: 16px; }
  .mb20            { margin-bottom: 20px; }
  .mono            { font-family: var(--mono); }
  .text2           { color: var(--text2); }
  .text3           { color: var(--text3); }
  .green           { color: var(--green); }
  .red             { color: var(--red); }
  .yellow          { color: var(--yellow); }
  .accent          { color: var(--accent); }
  .fw600           { font-weight: 600; }
  .fs12            { font-size: 12px; }
  .fs13            { font-size: 13px; }
  .divider         { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── Page title ───────────────────────────────────────────── */
  .page-title { font-size: 18px; font-weight: 700; }

  /* ── Scrollbar ────────────────────────────────────────────── */
  ::-webkit-scrollbar          { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track    { background: transparent; }
  ::-webkit-scrollbar-thumb    { background: var(--border2); border-radius: 2px; }

  /* ── Empty State ──────────────────────────────────────────── */
  .empty { text-align: center; color: var(--text3); padding: 32px 0; font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================================================
   CONSTANTS & DEFAULTS
   ============================================================ */
const DEFAULT_CATS = ['Food','Transport','Utilities','Healthcare','Entertainment','Shopping','Savings','Others'];

const CAT_EMOJI = {
  Food:'🍜', Transport:'🚌', Utilities:'💡', Healthcare:'💊',
  Entertainment:'🎮', Shopping:'🛍️', Savings:'🏦', Others:'📦'
};

const CAT_COLOR = {
  Food:'#f97316', Transport:'#06b6d4', Utilities:'#8b5cf6', Healthcare:'#22c55e',
  Entertainment:'#ec4899', Shopping:'#6366f1', Savings:'#14b8a6', Others:'#9090a8'
};

const PALETTE = ['#6366f1','#22c55e','#eab308','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#14b8a6','#a855f7'];

/* ============================================================
   HELPERS
   ============================================================ */
function fmt(n)    { return '₱' + Math.abs(n).toLocaleString('en-PH', { minimumFractionDigits:2, maximumFractionDigits:2 }); }
function fmtS(n)   { return (n < 0 ? '-' : '') + fmt(n); }
function uid()     { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today()   { return new Date().toISOString().split('T')[0]; }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }
function catColor(cat, i) { return CAT_COLOR[cat] || PALETTE[(i || 0) % PALETTE.length]; }
function nextMonth(dateStr) {
  const d = new Date(dateStr);
  d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

/* ============================================================
   APPLICATION STATE
   ============================================================ */
const STATE = {
  page: 'dashboard',
  txns: [],
  budgets: [],
  goals: [],
  cats: [...DEFAULT_CATS],
  settings: { dailyAllowance: 0, needs: 50, wants: 30, savs: 20 },
  modal: null,
  chartMode: 'monthly',
  filterType: 'all',
  filterCat: 'all',
  filterDateFrom: '',
  filterDateTo: '',
  searchQ: '',
};

/* ============================================================
   INDEXEDDB
   ============================================================ */
let DB = null;

function initDB() {
  return new Promise(res => {
    const req = indexedDB.open('pesotrack_v1', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      ['txns','budgets','goals','settings'].forEach(s => {
        if (!db.objectStoreNames.contains(s))
          db.createObjectStore(s, { keyPath: 'id' });
      });
    };
    req.onsuccess = e => { DB = e.target.result; res(DB); };
    req.onerror   = ()  => { console.warn('IndexedDB unavailable'); res(null); };
  });
}

function dbAll(store) {
  return new Promise(res => {
    if (!DB) { res([]); return; }
    const req = DB.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror   = () => res([]);
  });
}

function dbPut(store, obj) {
  return new Promise(res => {
    if (!DB) { res(); return; }
    const tx = DB.transaction(store,'readwrite');
    tx.objectStore(store).put(obj);
    tx.oncomplete = res;
  });
}

function dbDel(store, id) {
  return new Promise(res => {
    if (!DB) { res(); return; }
    const tx = DB.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = res;
  });
}

async function loadAll() {
  STATE.txns    = await dbAll('txns');
  STATE.budgets = await dbAll('budgets');
  STATE.goals   = await dbAll('goals');
  const rows    = await dbAll('settings');
  rows.forEach(r => {
    if (r.id === 'cats')     STATE.cats     = r.value;
    if (r.id === 'settings') STATE.settings = r.value;
  });
}

async function saveSettings() {
  await dbPut('settings', { id:'settings', value: STATE.settings });
  await dbPut('settings', { id:'cats',     value: STATE.cats });
}

/* ============================================================
   COMPUTED
   ============================================================ */
function txnsThisMonth() {
  const now = new Date();
  return STATE.txns.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
}

function sumIncome(txns)   { return txns.filter(t => t.type === 'income').reduce((s,t)  => s + t.amount, 0); }
function sumExpenses(txns) { return txns.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }

function healthScore() {
  const txns = txnsThisMonth();
  const inc  = sumIncome(txns);
  const exp  = sumExpenses(txns);
  if (inc === 0) return exp === 0 ? 100 : 0;
  const ratio    = clamp(exp / inc, 0, 1);
  const expScore = Math.round((1 - ratio) * 60);
  let budgetScore = 40;
  if (STATE.budgets.length > 0) {
    const catExp = catExpMap(txns);
    const ok = STATE.budgets.filter(b => (catExp[b.cat] || 0) <= b.limit).length;
    budgetScore = Math.round((ok / STATE.budgets.length) * 40);
  }
  return clamp(expScore + budgetScore, 0, 100);
}

function healthColor(s) { return s >= 71 ? 'var(--green)' : s >= 41 ? 'var(--yellow)' : 'var(--red)'; }
function healthLabel(s) { return s >= 71 ? 'Healthy'      : s >= 41 ? 'At Risk'       : 'Critical'; }
function healthTagClass(s) { return s >= 71 ? 'tag-green' : s >= 41 ? 'tag-yellow'    : 'tag-red'; }

function catExpMap(txns) {
  const m = {};
  (txns || txnsThisMonth()).filter(t => t.type === 'expense').forEach(t => { m[t.cat] = (m[t.cat] || 0) + t.amount; });
  return m;
}

function recurringDue() {
  const td = today();
  return STATE.txns.filter(t => t.recurring && t.recurDue === td && !t.recurConfirmed);
}

/* ============================================================
   CHART REGISTRY
   ============================================================ */
const CHARTS = {};
function destroyChart(id) {
  if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; }
}

function makePieChart(id, txns) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  const totals = catExpMap(txns);
  const labels = Object.keys(totals);
  const data   = labels.map(l => totals[l]);
  const colors = labels.map((l,i) => catColor(l,i));
  if (!labels.length) {
    el.parentElement.innerHTML = '<div class="empty">No expense data this month</div>';
    return;
  }
  CHARTS[id] = new Chart(el, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' ' + c.label + ': ' + fmt(c.raw) } }
      }
    }
  });
}

function makeTrendChart(id, mode) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  const now = new Date();
  const labels = [], incData = [], expData = [];

  if (mode === 'weekly') {
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      const txns = STATE.txns.filter(t => t.date === ds);
      labels.push(d.toLocaleDateString('en', { weekday:'short' }));
      incData.push(sumIncome(txns)); expData.push(sumExpenses(txns));
    }
  } else if (mode === 'yearly') {
    for (let i = 4; i >= 0; i--) {
      const y = now.getFullYear() - i;
      const txns = STATE.txns.filter(t => new Date(t.date).getFullYear() === y);
      labels.push(y); incData.push(sumIncome(txns)); expData.push(sumExpenses(txns));
    }
  } else {
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const txns = STATE.txns.filter(t => {
        const td = new Date(t.date);
        return td.getMonth() === d.getMonth() && td.getFullYear() === d.getFullYear();
      });
      labels.push(d.toLocaleString('en', { month:'short' }));
      incData.push(sumIncome(txns)); expData.push(sumExpenses(txns));
    }
  }

  CHARTS[id] = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Income',   data: incData, backgroundColor:'rgba(34,197,94,0.55)',  borderRadius:4, borderSkipped:false },
        { label:'Expenses', data: expData, backgroundColor:'rgba(239,68,68,0.55)', borderRadius:4, borderSkipped:false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + fmt(c.raw) } }
      },
      scales: {
        x: { ticks:{ color:'#9090a8' }, grid:{ display:false } },
        y: { ticks:{ color:'#9090a8', callback: v => fmt(v) }, grid:{ color:'rgba(42,42,50,.8)' } }
      }
    }
  });
}

function makeBudgetChart(id) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el || !STATE.budgets.length) return;
  const catExp = catExpMap();
  CHARTS[id] = new Chart(el, {
    type: 'bar',
    data: {
      labels: STATE.budgets.map(b => b.cat),
      datasets: [
        { label:'Used',  data: STATE.budgets.map(b => catExp[b.cat]||0), backgroundColor:'rgba(99,102,241,.75)', borderRadius:4, borderSkipped:false },
        { label:'Limit', data: STATE.budgets.map(b => b.limit),          backgroundColor:'rgba(42,42,50,.8)',    borderRadius:4, borderSkipped:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + fmt(c.raw) } }
      },
      scales: {
        x: { ticks:{ color:'#9090a8', callback: v => fmt(v) }, grid:{ color:'rgba(42,42,50,.6)' } },
        y: { ticks:{ color:'#9090a8' }, grid:{ display:false } }
      }
    }
  });
}

function makeSavingsChart(id, init, monthly, rate, years) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  const labels=[], data=[];
  let total = init;
  const mr = rate / 100 / 12;
  const totalMonths = years * 12;
  const step = totalMonths <= 24 ? 1 : Math.ceil(totalMonths / 24);
  for (let i = 0; i <= totalMonths; i++) {
    if (i % step === 0 || i === totalMonths) {
      labels.push(i === 0 ? 'Start' : 'Mo ' + i);
      data.push(Math.round(total));
    }
    total = total * (1 + mr) + monthly;
  }
  CHARTS[id] = new Chart(el, {
    type:'line',
    data:{ labels, datasets:[{ label:'Savings', data, borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,.12)', fill:true, tension:.35, pointRadius:0 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: c=>'Total: '+fmt(c.raw) } } },
      scales:{
        x:{ ticks:{ color:'#9090a8', maxTicksLimit:8 }, grid:{ display:false } },
        y:{ ticks:{ color:'#9090a8', callback: v=>fmt(v) }, grid:{ color:'rgba(42,42,50,.8)' } }
      }
    }
  });
}

/* ============================================================
   RENDER ENGINE
   ============================================================ */
function render() {
  const score = healthScore();
  document.getElementById('root').innerHTML = `
    ${renderNav()}
    <div class="main">
      ${renderBanner()}
      ${
        STATE.page === 'dashboard'    ? renderDashboard(score) :
        STATE.page === 'transactions' ? renderTransactions()   :
        STATE.page === 'budget'       ? renderBudget()         :
        STATE.page === 'goals'        ? renderGoals()          :
                                        renderTools()
      }
    </div>
    ${STATE.modal ? renderModal() : ''}
  `;
  scheduleCharts();
}

function scheduleCharts() {
  requestAnimationFrame(() => {
    if (STATE.page === 'dashboard') {
      makePieChart('pieChart', txnsThisMonth());
      makeTrendChart('trendChart', STATE.chartMode);
    }
    if (STATE.page === 'budget')  makeBudgetChart('budgetChart');
    if (STATE.page === 'tools')   updateCalcChart();
  });
}

function renderGoals() {

  return `

    <button class="btn btn-primary" onclick="openModal('addGoal')">+ New Goal</button>
  </div>

  ${active.length ? active.map(goalCard).join('') :
    '<div class="card mb12"><div class="empty">No active goals. Create one to start saving!</div></div>'}

  ${archived.length ? `
  <hr class="divider">
  <div class="section-title">Archived Goals (${archived.length})</div>
  ${archived.map(g => `
    <div class="card-sm mb8 flex items-center justify-between">
      <div>
        <div class="fs13 fw600">${g.name}</div>

      </div>
      <span class="tag tag-green">✓ Done</span>
    </div>`).join('')}` : ''}`;
}

function goalCard(g) {
  const txns   = STATE.txns.filter(t => t.goalId === g.id && t.type === 'expense');
  const saved  = txns.reduce((s,t) => s + t.amount, 0);
  const pct    = clamp(saved / g.target * 100, 0, 100);
  const ageMs  = Date.now() - new Date(g.created).getTime();
  const ageMo  = ageMs / 2592000000;
  const rate   = ageMo > 0 ? saved / ageMo : 0;
  const rem    = g.target - saved;
  const months = rate > 0 ? Math.ceil(rem / rate) : null;
  const projected = months != null
    ? new Date(Date.now() + months*30*86400000).toLocaleDateString('en-PH',{month:'short',year:'numeric'})
    : null;

  return `<div class="card mb12">
    <div class="flex items-center justify-between mb12">
      <div>
        <div style="font-size:15px;font-weight:600">${g.name}</div>
        <div class="text2 fs12">
          Target: ${fmt(g.target)}${g.deadline ? ' · Deadline: ' + g.deadline : ''}
        </div>
      </div>
      <div class="flex gap8">
        <span class="tag tag-accent">${Math.round(pct)}%</span>
        <button class="btn btn-sm btn-danger" onclick="deleteGoal('${g.id}')" aria-label="Delete goal">✕</button>
      </div>
    </div>
    <div class="progress-track mb8">
      <div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div>
    </div>
    <div class="flex items-center justify-between mb12 text2 fs12">
      <span>${fmt(saved)} saved</span>
      <span>${fmt(rem)} remaining</span>
    </div>
    ${projected ? `<div class="card-sm mb12 fs12">
      <span class="text2">Projected completion: </span>
      <span class="fw600">${projected}</span>
      ${rate ? `<span class="text2"> at ${fmt(Math.round(rate))}/mo current rate</span>` : ''}
    </div>` : ''}
    <div>
      <div class="section-title" style="font-size:10px;margin-bottom:6px">What-If: adjust monthly contribution</div>
      <div class="flex items-center gap8">
        <input type="range" min="100" max="${Math.max(g.target, 100000)}" step="100"
          value="${Math.max(rate||500,100)}"
          oninput="updateWhatIf(this,'${g.id}',${g.target},${saved})"
          id="slider-${g.id}" style="flex:1" aria-label="What-if monthly contribution slider">
        <span id="wi-${g.id}" style="font-size:12px;min-width:120px;color:var(--text2);text-align:right">drag to simulate</span>
      </div>
    </div>
  </div>`;
}

function updateWhatIf(slider, goalId, target, saved) {
  const monthly = parseFloat(slider.value);
  const rem     = target - saved;
  const months  = monthly > 0 ? Math.ceil(rem / monthly) : null;
  const el      = document.getElementById('wi-' + goalId);
  if (el) el.textContent = months != null
    ? `${fmt(monthly)}/mo → ${months} mo`
    : '—';
}

      <button class="btn" onclick="cancelEditCat()">Cancel</button>
    </div>
  </div>`;
}

function ruleResultHTML(inc, n, w, s) {
  const total = n + w + s;
  return `<div class="card-sm">
    <div style="font-size:11px;color:${total===100?'var(--green)':'var(--red)'};margin-bottom:10px">
      Total: ${total}% ${total===100?'✓ Perfect balance':'⚠ Must equal 100%'}
    </div>
    <div class="flex items-center justify-between mb8">
      <span class="fs13">🏠 Needs (${n}%)</span>
      <span class="mono green">${fmt(inc * n / 100)}</span>
    </div>
    <div class="flex items-center justify-between mb8">
      <span class="fs13">🎯 Wants (${w}%)</span>
      <span class="mono yellow">${fmt(inc * w / 100)}</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="fs13">💰 Savings (${s}%)</span>
      <span class="mono accent">${fmt(inc * s / 100)}</span>
    </div>
  </div>`;
}

/* ============================================================
   MODALS
   ============================================================ */
function renderModal() {
  const m = STATE.modal;
  let content = '';

  if (m === 'addTxn') {
    content = `
    <div class="modal-title">Add Transaction</div>
    <div class="form-group">
      <label class="form-label" for="mType">Type</label>
      <select class="form-control" id="mType">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="mAmt">Amount (₱)</label>
      <input class="form-control" id="mAmt" type="number" min="0.01" step="0.01" placeholder="0.00" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="mCat">Category</label>
      <select class="form-control" id="mCat">
        ${STATE.cats.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="mDate">Date</label>
      <input class="form-control" id="mDate" type="date" value="${today()}">
    </div>
    <div class="form-group">
      <label class="form-label" for="mDesc">Description (optional)</label>
      <input class="form-control" id="mDesc" placeholder="e.g. Lunch at canteen">
    </div>
    <div class="form-group">
      <label class="form-label" for="mGoal">Link to Saving Goal (optional)</label>
      <select class="form-control" id="mGoal">
        <option value="">None</option>
        ${STATE.goals.filter(g=>!g.archived).map(g => `<option value="${g.id}">${g.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group flex items-center gap8">
      <input type="checkbox" class="toggle" id="mRecur">
      <label class="form-label" style="margin:0;cursor:pointer" for="mRecur">Recurring (repeats monthly)</label>
    </div>
    <div class="flex gap8">
      <button class="btn flex-1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="addTxn()">Add Transaction</button>
    </div>`;

  } else if (m === 'addBudget') {
    content = `
    <div class="modal-title">Add Budget Category</div>
    <div class="form-group">
      <label class="form-label" for="bCat">Category</label>
      <select class="form-control" id="bCat">
        ${STATE.cats.filter(c => !STATE.budgets.find(b => b.cat === c)).map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="bLimit">Monthly Limit (₱)</label>
      <input class="form-control" id="bLimit" type="number" min="0.01" step="0.01" placeholder="0.00" autofocus>
    </div>
    <div class="form-group flex items-center gap8">
      <input type="checkbox" class="toggle" id="bRollover">
      <label class="form-label" style="margin:0;cursor:pointer" for="bRollover">Enable Rollover (unused budget carries forward)</label>
    </div>
    <div class="flex gap8">
      <button class="btn flex-1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="addBudget()">Save Budget</button>
    </div>`;

  } else if (m === 'addGoal') {
    content = `
    <div class="modal-title">New Saving Goal</div>
    <div class="form-group">
      <label class="form-label" for="gName">Goal Name</label>
      <input class="form-control" id="gName" placeholder="e.g. Emergency Fund" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="gTarget">Target Amount (₱)</label>
      <input class="form-control" id="gTarget" type="number" min="1" step="0.01" placeholder="0.00">
    </div>
    <div class="form-group">
      <label class="form-label" for="gDeadline">Deadline (optional)</label>
      <input class="form-control" id="gDeadline" type="date">
    </div>
    <div class="flex gap8">
      <button class="btn flex-1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="addGoal()">Create Goal</button>
    </div>`;

  } else if (m === 'recurring') {
    const due = recurringDue();
    content = `
    <div class="modal-title">Recurring Transactions Due</div>
    <div class="text2 fs13 mb16">These repeat monthly. Confirm to log them, or skip to defer.</div>
    ${due.map(t => `
      <div class="card-sm mb12">
        <div class="flex items-center justify-between mb8">
          <div>
            <div class="fs13 fw600">${t.desc || t.cat}</div>
            <div class="text2 fs12">${t.cat} · ${fmt(t.amount)}</div>
          </div>
          <span class="tag ${t.type==='income'?'tag-green':'tag-red'}">${t.type}</span>
        </div>
        <div class="flex gap8">
          <button class="btn btn-sm flex-1 btn-primary" onclick="confirmRecurring('${t.id}')">✓ Confirm</button>
          <button class="btn btn-sm flex-1 btn-danger"  onclick="skipRecurring('${t.id}')">Skip</button>
        </div>
      </div>`).join('')}
    <button class="btn w100" onclick="closeModal()">Close</button>`;
  }

  return `<div class="modal-overlay" role="dialog" aria-modal="true"
    onclick="if(event.target===this)closeModal()">
    <div class="modal">${content}</div>
  </div>`;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function navigate(p)     { STATE.page = p; render(); }
function setChartMode(m) { STATE.chartMode = m; render(); }
function openModal(m)    { STATE.modal = m; render(); }
function closeModal()    { STATE.modal = null; render(); }
function clearFilters()  { STATE.filterType='all'; STATE.filterCat='all'; STATE.filterDateFrom=''; STATE.filterDateTo=''; STATE.searchQ=''; render(); }

async function addTxn() {
  const type      = document.getElementById('mType').value;
  const amt       = parseFloat(document.getElementById('mAmt').value);
  const cat       = document.getElementById('mCat').value;
  const date      = document.getElementById('mDate').value;
  const desc      = document.getElementById('mDesc').value.trim();
  const goalId    = document.getElementById('mGoal').value;
  const recurring = document.getElementById('mRecur').checked;

  if (!amt || isNaN(amt) || amt <= 0) { alert('Please enter a valid amount greater than zero.'); return; }
  if (!date)                           { alert('Please select a date.'); return; }

  const txn = {
    id: uid(), type, amount: amt, cat, date, desc, goalId, recurring,
    recurDue: recurring ? nextMonth(date) : null,
    recurConfirmed: false,
    created: new Date().toISOString()
  };
  STATE.txns.push(txn);
  await dbPut('txns', txn);
  closeModal();
}

async function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  STATE.txns = STATE.txns.filter(t => t.id !== id);
  await dbDel('txns', id);
  render();
}

async function addBudget() {
  const cat      = document.getElementById('bCat').value;
  const limit    = parseFloat(document.getElementById('bLimit').value);
  const rollover = document.getElementById('bRollover').checked;

  if (!cat)                             { alert('Please select a category.'); return; }
  if (!limit || isNaN(limit) || limit <= 0) { alert('Please enter a valid limit.'); return; }

  const b = { id: uid(), cat, limit, rollover, created: new Date().toISOString() };
  STATE.budgets.push(b);
  await dbPut('budgets', b);
  closeModal();
}

async function deleteBudget(id) {
  STATE.budgets = STATE.budgets.filter(b => b.id !== id);
  await dbDel('budgets', id);
  render();
}

async function addGoal() {
  const name     = document.getElementById('gName').value.trim();
  const target   = parseFloat(document.getElementById('gTarget').value);
  const deadline = document.getElementById('gDeadline').value;

  if (!name)                               { alert('Please enter a goal name.'); return; }
  if (!target || isNaN(target) || target <= 0) { alert('Please enter a valid target amount.'); return; }

  const g = { id: uid(), name, target, deadline, archived: false, created: new Date().toISOString() };
  STATE.goals.push(g);
  await dbPut('goals', g);
  closeModal();
}

async function deleteGoal(id) {
  if (!confirm('Delete this goal?')) return;
  STATE.goals = STATE.goals.filter(g => g.id !== id);
  await dbDel('goals', id);
  render();
}

async function saveDailyAllowance() {
  const v = parseFloat(document.getElementById('dailyInput').value);
  STATE.settings.dailyAllowance = isNaN(v) || v < 0 ? 0 : v;
  await saveSettings();
  render();
}

async function removeDailyAllowance() {
  STATE.settings.dailyAllowance = 0;
  await saveSettings();
  render();
}

async function confirmRecurring(id) {
  const t = STATE.txns.find(x => x.id === id);
  if (!t) return;
  const clone = { ...t, id: uid(), date: today(), recurring: false, recurDue: null, recurConfirmed: false, created: new Date().toISOString() };
  t.recurConfirmed = true;
  t.recurDue       = nextMonth(today());
  STATE.txns.push(clone);
  await dbPut('txns', t);
  await dbPut('txns', clone);
  const remaining = recurringDue();
  if (!remaining.length) closeModal(); else render();
}

async function skipRecurring(id) {
  const t = STATE.txns.find(x => x.id === id);
  if (!t) return;
  t.recurConfirmed = true;
  t.recurDue       = nextMonth(today());
  await dbPut('txns', t);
  const remaining = recurringDue();
  if (!remaining.length) closeModal(); else render();
}

async function addCat() {
  const v = document.getElementById('newCat').value.trim();
  if (!v)                       { alert('Enter a category name.'); return; }
  if (STATE.cats.includes(v))   { alert('Category already exists.'); return; }
  STATE.cats.push(v);
  document.getElementById('newCat').value = '';
  await saveSettings();
  render();
}

async function deleteCat(c) {
  if (!confirm(`Remove category "${c}"? Existing transactions will keep this category label.`)) return;
  STATE.cats = STATE.cats.filter(x => x !== c);
  await saveSettings();
  render();
}

let _editingCat = null;

function startEditCat(c) {
  _editingCat = c;
  // Re-render to show edit row (simpler: just manipulate DOM directly)
  const addRow  = document.getElementById('catAddRow');
  const editRow = document.getElementById('catEditRow');
  const input   = document.getElementById('editCatVal');
  if (!addRow || !editRow || !input) return;
  addRow.style.display  = 'none';
  editRow.style.cssText = 'display:flex;gap:8px';
  input.value = c;
  input.focus();
  input.select();
}

async function confirmEditCat() {
  const newName = document.getElementById('editCatVal')?.value.trim();
  if (!newName)                         { alert('Enter a category name.'); return; }
  if (newName === _editingCat)          { cancelEditCat(); return; }
  if (STATE.cats.includes(newName))     { alert('Category already exists.'); return; }
  // Rename in cats list preserving order
  const idx = STATE.cats.indexOf(_editingCat);
  if (idx !== -1) STATE.cats[idx] = newName;
  // Rename in all transactions
  STATE.txns.forEach(t => { if (t.cat === _editingCat) t.cat = newName; });
  // Rename in all budgets
  STATE.budgets.forEach(b => { if (b.cat === _editingCat) b.cat = newName; });
  // Persist
  for (const t of STATE.txns.filter(t => t.cat === newName)) await dbPut('txns', t);
  for (const b of STATE.budgets.filter(b => b.cat === newName)) await dbPut('budgets', b);
  _editingCat = null;
  await saveSettings();
  render();
}

function cancelEditCat() {
  _editingCat = null;
  const addRow  = document.getElementById('catAddRow');
  const editRow = document.getElementById('catEditRow');
  if (addRow)  addRow.style.display  = '';
  if (editRow) editRow.style.cssText = 'display:none!important';
}

function updateCalcChart() {
  const ci = parseFloat(document.getElementById('ci')?.value  || 0);
  const cm = parseFloat(document.getElementById('cm')?.value  || 0);
  const cr = parseFloat(document.getElementById('cr')?.value  || 5);
  const cy = parseInt(document.getElementById('cy')?.value    || 5);
  if (isNaN(ci)||isNaN(cm)||isNaN(cr)||isNaN(cy)) return;

  let total = ci;
  const mr  = cr / 100 / 12;
  for (let i = 0; i < cy*12; i++) total = total*(1+mr) + cm;

  const el = document.getElementById('calcResult');
  if (el) el.textContent = `After ${cy} year${cy!==1?'s':''}: ${fmt(Math.round(total))} total`;
  makeSavingsChart('calcChart', ci, cm, cr, cy);
}

function updateRule() {
  const inc = parseFloat(document.getElementById('rInc')?.value   || 0);
  const n   = parseInt(document.getElementById('rNeeds')?.value   || 50);
  const w   = parseInt(document.getElementById('rWants')?.value   || 30);
  const s   = parseInt(document.getElementById('rSavs')?.value    || 20);
  const el  = document.getElementById('ruleResult');
  if (el) el.innerHTML = ruleResultHTML(inc, n, w, s);
}

async function adjustRuleSlider(changed, newVal) {
  // Clamp to valid range
  newVal = Math.max(0, Math.min(100, newVal));
  const keys = ['needs','wants','savs'];
  const ids  = { needs:'rNeeds', wants:'rWants', savs:'rSavs' };
  const vals = {
    needs: parseInt(document.getElementById('rNeeds')?.value || 50),
    wants: parseInt(document.getElementById('rWants')?.value || 30),
    savs:  parseInt(document.getElementById('rSavs')?.value  || 20),
  };
  vals[changed] = newVal;

  // Distribute remainder across the other two proportionally
  const others = keys.filter(k => k !== changed);
  const remaining = 100 - newVal;
  const otherSum = vals[others[0]] + vals[others[1]];
  if (otherSum === 0) {
    vals[others[0]] = Math.round(remaining / 2);
    vals[others[1]] = remaining - vals[others[0]];
  } else {
    vals[others[0]] = Math.round(remaining * vals[others[0]] / otherSum);
    vals[others[1]] = remaining - vals[others[0]];
  }
  // Ensure no negatives
  if (vals[others[1]] < 0) { vals[others[0]] += vals[others[1]]; vals[others[1]] = 0; }
  if (vals[others[0]] < 0) { vals[others[0]] = 0; }

  // Update DOM
  keys.forEach(k => {
    const slider = document.getElementById(ids[k]);
    const label  = document.getElementById(ids[k] + 'Val');
    if (slider) slider.value = vals[k];
    if (label)  label.textContent = vals[k] + '%';
  });

  STATE.settings.needs = vals.needs;
  STATE.settings.wants = vals.wants;
  STATE.settings.savs  = vals.savs;
  await saveSettings();
  updateRule();
}

async function updateRuleSettings() {
  STATE.settings.needs = parseInt(document.getElementById('rNeeds')?.value || 50);
  STATE.settings.wants = parseInt(document.getElementById('rWants')?.value || 30);
  STATE.settings.savs  = parseInt(document.getElementById('rSavs')?.value  || 20);
  await saveSettings();
  updateRule();
}

function exportCSV(type) {
  let csv = '', filename = '';
  if (type === 'txns') {
    csv = 'ID,Date,Type,Category,Description,Amount,Recurring,GoalID\n';
    STATE.txns.forEach(t => {
      csv += `${t.id},${t.date},${t.type},${t.cat},"${(t.desc||'').replace(/"/g,'""')}",${t.amount},${t.recurring},${t.goalId||''}\n`;
    });
    filename = 'pesotrack_transactions.csv';
  } else if (type === 'budgets') {
    csv = 'ID,Category,Limit,Rollover\n';
    STATE.budgets.forEach(b => { csv += `${b.id},${b.cat},${b.limit},${b.rollover}\n`; });
    filename = 'pesotrack_budgets.csv';
  } else if (type === 'goals') {
    csv = 'ID,Name,Target,Deadline,Archived,Created\n';
    STATE.goals.forEach(g => { csv += `${g.id},"${g.name}",${g.target},${g.deadline||''},${g.archived},${g.created}\n`; });
    filename = 'pesotrack_goals.csv';
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

   BOOT
   ============================================================ */
async function boot() {
  await initDB();
  await loadAll();
  render();
}

boot();
